#cloud-config
# Bootstraps Docker + Docker Compose, clones the repo, and starts the app.
# Terraform renders ${var.*} values via templatefile() — see main.tf.
# Variables passed in: repo_url, session_secret, registration_code

package_update: true
package_upgrade: true

packages:
  - git
  - firewalld

runcmd:
  # Install Docker (Oracle Linux 8)
  - dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  - dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable --now docker

  # Open firewall ports
  - systemctl enable --now firewalld
  - firewall-cmd --permanent --add-port=22/tcp
  - firewall-cmd --permanent --add-port=3000/tcp
  - firewall-cmd --reload

  # Clone the app
  - git clone ${repo_url} /opt/financial-manager

  # Write .env file for docker compose
  - |
    cat > /opt/financial-manager/.env <<'EOF'
    SESSION_SECRET=${session_secret}
    REGISTRATION_CODE=${registration_code}
    EOF

  # Persist data directory
  - mkdir -p /opt/financial-manager/data

  # Start the app
  - cd /opt/financial-manager && docker compose up -d --build

  # Enable restart on boot
  - |
    cat > /etc/systemd/system/financial-manager.service <<'EOF'
    [Unit]
    Description=Financial Manager
    After=docker.service
    Requires=docker.service

    [Service]
    Type=oneshot
    RemainAfterExit=yes
    WorkingDirectory=/opt/financial-manager
    ExecStart=/usr/bin/docker compose up -d
    ExecStop=/usr/bin/docker compose down
    TimeoutStartSec=0

    [Install]
    WantedBy=multi-user.target
    EOF
  - systemctl enable financial-manager
